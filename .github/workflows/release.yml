name: Build & Publish Release (Todo Artesanal)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for the release (e.g. v2026.03.03.1). If empty, a timestamp tag is used."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, bcmath, pdo_mysql, zip
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Composer install (prod)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Build assets (Vite)
        run: |
          npm ci
          npm run build

      - name: Prepare runtime dirs
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/{cache,sessions,views}
          mkdir -p storage/logs

      - name: Create release.zip (exclude env & git)
        run: |
          zip -r release.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x ".env" \
            -x ".env.*" \
            -x "tests/*" \
            -x "storage/logs/*" \
            -x "storage/framework/cache/*" \
            -x "storage/framework/sessions/*" \
            -x "storage/framework/views/*"

      - name: Compute tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(date +'%Y.%m.%d.%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: Create/Update GitHub Release "latest" (stable)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          body: "Automated build from ${{ github.sha }}"
          files: release.zip
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}