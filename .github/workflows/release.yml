name: Build & Publish Tagged Release (Laravel 12)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v2026.03.03)"
        required: true

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, pdo_mysql, zip
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare Laravel writable dirs (before composer)
        run: |
            mkdir -p bootstrap/cache
            mkdir -p storage/framework/cache
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/views
            mkdir -p storage/logs
            chmod -R 0777 storage bootstrap/cache

      - name: Composer install (prod)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader --no-scripts

      - name: Build assets (Vite)
        run: |
          npm ci
          npm run build

      - name: Create release.zip
        run: |
          zip -r release.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x ".env" \
            -x ".env.*" \
            -x "tests/*" \
            -x "storage/logs/*" \
            -x "storage/framework/cache/*" \
            -x "storage/framework/sessions/*" \
            -x "storage/framework/cache/*" \
            -x "storage/framework/sessions/*" \
            -x "storage/framework/views/*"

      - name: Publish GitHub Release (tagged)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          body: "Automated build from ${{ github.sha }}"
          files: release.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}